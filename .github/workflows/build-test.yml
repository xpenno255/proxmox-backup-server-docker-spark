name: Build & Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build (ARM64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read VERSION
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: pbs-test:arm64
          cache-from: type=gha,scope=build-arm64
          cache-to: type=gha,mode=max,scope=build-arm64

      - name: Smoke test via QEMU
        run: |
          docker run -d --name pbs-test \
            --tmpfs /run \
            -p 8007:8007 \
            pbs-test:arm64

          echo "Waiting for PBS to start..."
          sleep 20

          # Check container is running
          docker ps | grep pbs-test
          STATUS=$(docker inspect --format='{{.State.Status}}' pbs-test)
          echo "Container status: $STATUS"
          if [ "$STATUS" != "running" ]; then
            echo "Container failed to start!"
            docker logs pbs-test
            exit 1
          fi

          # Check port 8007 is listening
          curl -sk https://localhost:8007 || echo "Web UI check (expected self-signed cert warning)"

          docker stop pbs-test
          docker rm pbs-test

      - name: Export image artifact
        run: |
          docker save pbs-test:arm64 | gzip > pbs-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pbs-image-arm64
          path: pbs-arm64.tar.gz
          retention-days: 7
