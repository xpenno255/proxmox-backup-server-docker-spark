services:
  pbs:
    image: ghcr.io/xpenno255/proxmox-backup-server-docker-spark:latest
    container_name: proxmox-backup-server
    ports:
      - "8007:8007"
    environment:
      - NAS_ADDRESS=           # Your NAS IP address
      - NAS_SHARE=             # NFS export path (e.g. /volume1/Backups)
      - NAS_MOUNT_POINT=/backups
      - NAS_MOUNT_OPTS=rw,nolock,vers=3,soft,timeo=50
      - NAS_RETRY_INTERVAL=60
    volumes:
      - pbs_etc:/etc/proxmox-backup
      - pbs_logs:/var/log/proxmox-backup
      - pbs_lib:/var/lib/proxmox-backup
    tmpfs:
      - /run
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    restart: unless-stopped
    stop_signal: SIGHUP
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "/nas-health.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  pbs_etc:
  pbs_logs:
  pbs_lib:
